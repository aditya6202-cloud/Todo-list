<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daynest — Forgot Password</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lora:ital,wght@0,500;1,400&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="auth-screen">
    <div class="auth-bg-deco">
      <div class="deco-circle c1"></div>
      <div class="deco-circle c2"></div>
    </div>

    <!-- Step 1: Enter email -->
    <div class="auth-card" id="step-email">
      <button class="btn-back" onclick="window.location.href='login.html'">← Back to Login</button>
      <div class="auth-icon">🔐</div>
      <h2 class="auth-title">Forgot Password?</h2>
      <p class="auth-subtitle"><em>No worries! We'll send you a reset link</em></p>

      <label class="auth-label">Email Address</label>
      <input type="email" id="reset-email" class="auth-input" placeholder="you@email.com"/>

      <button class="btn-auth" id="reset-btn" onclick="handleForgotPassword()">
        Send Reset Link ✦
      </button>

      <p class="auth-switch">Remember your password?
        <span onclick="window.location.href='login.html'">Login</span>
      </p>
      <div id="reset-error" class="auth-error hidden"></div>
    </div>

    <!-- Step 2: Success message -->
    <div class="auth-card" id="step-success" style="display:none; text-align:center;">
      <div class="auth-icon">📬</div>
      <h2 class="auth-title">Check your Email!</h2>
      <p class="auth-subtitle" style="margin-bottom:20px;">
        <em>We sent a password reset link to</em>
      </p>
      <div style="background:var(--warm-bg);padding:12px 16px;border-radius:var(--radius-md);font-weight:800;color:var(--amber-deep);margin-bottom:20px;" id="sent-email"></div>
      <p style="font-size:0.82rem;color:var(--text-soft);font-weight:600;line-height:1.6;margin-bottom:20px;">
        Click the link in the email to reset your password. Check your spam folder if you don't see it.
      </p>
      <button class="btn-auth" onclick="window.location.href='login.html'">Back to Login ✦</button>
      <p style="margin-top:14px;font-size:0.78rem;color:var(--text-soft);font-weight:600;">
        Didn't receive it? 
        <span style="color:var(--amber-deep);cursor:pointer;font-weight:800;" onclick="resendEmail()">Resend email</span>
      </p>
    </div>

  </div>

  <div id="toast"></div>
  <script src="supabase.js"></script>
  <script>
    let lastEmail = '';

    async function handleForgotPassword() {
      const email = document.getElementById('reset-email').value.trim();
      const btn   = document.getElementById('reset-btn');
      const errEl = document.getElementById('reset-error');

      if (!email) { showError('Please enter your email address ⚠️'); return; }
      if (!email.includes('@')) { showError('Please enter a valid email ⚠️'); return; }

      btn.textContent = 'Sending…';
      btn.disabled = true;

      try {
        await SupabaseDB.forgotPassword(email);
        lastEmail = email;
        document.getElementById('sent-email').textContent = email;
        document.getElementById('step-email').style.display   = 'none';
        document.getElementById('step-success').style.display = 'block';
      } catch(e) {
        showError(e.message || 'Failed to send reset email. Try again.');
        btn.textContent = 'Send Reset Link ✦';
        btn.disabled = false;
      }
    }

    async function resendEmail() {
      if (!lastEmail) return;
      try {
        await SupabaseDB.forgotPassword(lastEmail);
        showToast('Reset email sent again! 📬');
      } catch(e) {
        showToast('Failed to resend: ' + e.message);
      }
    }

    function showError(msg) {
      const el = document.getElementById('reset-error');
      el.textContent = msg;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 4000);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleForgotPassword();
    });

    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
    }
  </script>
</body>
</html>
