<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daynest — Your Cozy Planner</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lora:ital,wght@0,500;1,400&display=swap" rel="stylesheet"/>
  <script src="theme.js"></script>
</head>
<body>
  <div id="splash-screen" class="screen active">
    <div class="splash-bg-deco">
      <div class="deco-circle c1"></div>
      <div class="deco-circle c2"></div>
      <div class="deco-circle c3"></div>
    </div>
    <div class="splash-content">
      <div class="splash-illustration">
        <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg" class="splash-svg">
          <ellipse cx="100" cy="200" rx="80" ry="12" fill="#C8935A" opacity="0.3"/>
          <rect x="30" y="170" width="60" height="25" rx="6" fill="#7A9E5F"/>
          <text x="60" y="187" text-anchor="middle" font-size="9" fill="white" font-family="Nunito" font-weight="800">ideas</text>
          <rect x="55" y="148" width="60" height="25" rx="6" fill="#C8935A"/>
          <text x="85" y="165" text-anchor="middle" font-size="9" fill="white" font-family="Nunito" font-weight="800">plan</text>
          <rect x="80" y="126" width="70" height="25" rx="6" fill="#E8624A"/>
          <text x="115" y="143" text-anchor="middle" font-size="9" fill="white" font-family="Nunito" font-weight="800">execution</text>
          <circle cx="130" cy="95" r="16" fill="#F5D5A8"/>
          <rect x="118" y="110" width="24" height="30" rx="8" fill="#F5C97A"/>
          <line x1="118" y1="118" x2="100" y2="112" stroke="#F5D5A8" stroke-width="6" stroke-linecap="round"/>
          <line x1="142" y1="118" x2="158" y2="108" stroke="#F5D5A8" stroke-width="6" stroke-linecap="round"/>
          <rect x="155" y="90" width="8" height="28" rx="2" fill="#E8A84C" transform="rotate(-30 155 90)"/>
          <polygon points="155,118 163,118 159,126" fill="#F5D5A8" transform="rotate(-30 155 90)"/>
          <rect x="120" y="138" width="10" height="22" rx="5" fill="#A0724A"/>
          <rect x="132" y="138" width="10" height="22" rx="5" fill="#A0724A"/>
          <ellipse cx="130" cy="84" rx="16" ry="10" fill="#6B4226"/>
          <line x1="55" y1="80" x2="55" y2="160" stroke="#C8935A" stroke-width="3"/>
          <circle cx="55" cy="90" r="5" fill="#E8A84C"/>
          <line x1="55" y1="90" x2="55" y2="65" stroke="#E8A84C" stroke-width="3" stroke-linecap="round"/>
          <line x1="55" y1="90" x2="80" y2="90" stroke="#E8A84C" stroke-width="3" stroke-linecap="round"/>
          <line x1="55" y1="90" x2="55" y2="115" stroke="#E8A84C" stroke-width="3" stroke-linecap="round"/>
          <line x1="55" y1="90" x2="30" y2="90" stroke="#E8A84C" stroke-width="3" stroke-linecap="round"/>
          <circle cx="22" cy="145" r="12" fill="#7A9E5F"/>
          <rect x="19" y="155" width="6" height="15" fill="#A0724A"/>
          <ellipse cx="40" cy="35" rx="18" ry="10" fill="white" opacity="0.7"/>
          <ellipse cx="55" cy="30" rx="14" ry="9" fill="white" opacity="0.7"/>
          <ellipse cx="160" cy="50" rx="15" ry="8" fill="white" opacity="0.6"/>
          <text x="170" y="30" font-size="14" fill="#E8A84C">✦</text>
          <text x="15" y="55" font-size="10" fill="#C8935A">✦</text>
        </svg>
      </div>
      <h1 class="splash-title">Daynest</h1>
      <p class="splash-subtitle"><em>Plan your day, one cozy step at a time</em></p>
      <div class="welcome-btns">
        <button class="btn-welcome btn-guest" onclick="goAsGuest()">
          <span class="btn-icon">👤</span>
          <span class="btn-label">Guest</span>
          <span class="btn-sub">No account needed</span>
        </button>
        <button class="btn-welcome btn-login" onclick="window.location.href='login.html'">
          <span class="btn-icon">🔑</span>
          <span class="btn-label">Login</span>
          <span class="btn-sub">Already have account</span>
        </button>
        <button class="btn-welcome btn-signup" onclick="window.location.href='signup.html'">
          <span class="btn-icon">✨</span>
          <span class="btn-label">Sign Up</span>
          <span class="btn-sub">Create new account</span>
        </button>
      </div>
    </div>
  </div>
  <div id="toast"></div>
  <script src="supabase.js"></script>
  <script>
    function goAsGuest() {
      localStorage.setItem('dn_user', JSON.stringify({ name: 'Guest', email: '', isGuest: true }));
      window.location.href = 'app.html';
    }
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
    }
  </script>
</body>
</html>
